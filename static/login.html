<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sign In — LibraryMS</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-logo">📚 LibraryMS</div>
    <p class="auth-subtitle">Library Management System</p>

    <div id="error-msg" style="display:none; background:#fee2e2; color:#991b1b; padding:10px 14px; border-radius:8px; margin-bottom:16px; font-size:13px;"></div>

    <form id="login-form">
      <div class="form-group">
        <label for="email">Email address</label>
        <input type="email" id="email" class="form-control" placeholder="you@example.com" required autofocus>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" class="form-control" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn btn-primary w-full btn-lg" id="submit-btn">Sign In</button>
    </form>

    <div class="auth-footer">
      Don't have an account? <a href="/register.html">Create one</a>
    </div>

    <hr class="divider">
    <div style="font-size:12px; color:var(--text-muted); text-align:center; line-height:1.8;">
      <strong>Demo accounts</strong><br>
      Admin: admin@library.com / Admin123!<br>
      Clerk: clerk@library.com / Clerk123!
    </div>
  </div>
</div>

<script src="/js/api.js"></script>
<script>
  // Already logged in? Redirect.
  API.get('/api/auth/me').then(u => { window.location = '/dashboard.html'; }).catch(() => {});

  document.getElementById('login-form').addEventListener('submit', async e => {
    e.preventDefault();
    const btn = document.getElementById('submit-btn');
    const err = document.getElementById('error-msg');
    err.style.display = 'none';
    btn.disabled = true;
    btn.textContent = 'Signing in…';
    try {
      const user = await API.post('/api/auth/login', {
        email: document.getElementById('email').value,
        password: document.getElementById('password').value,
      });
      window.location = '/dashboard.html';
    } catch (e) {
      err.textContent = e.message;
      err.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'Sign In';
    }
  });
</script>
</body>
</html>
