<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin Dashboard — LibraryMS</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="admin-layout">
  <aside class="sidebar">
    <div class="sidebar-logo">📚 LibraryMS</div>
    <nav id="sidebar-nav"></nav>
    <div class="sidebar-footer">
      <button class="btn btn-outline btn-sm w-full" onclick="logout()" style="color:#94a3b8; border-color:#334155;">Sign Out</button>
    </div>
  </aside>

  <main class="admin-main">
    <div class="page-header">
      <div>
        <h1 class="page-title">Admin Dashboard</h1>
        <p class="page-subtitle">System overview and quick stats.</p>
      </div>
      <span id="admin-badge"></span>
    </div>

    <div class="stats-grid" id="stats-grid"></div>

    <div style="display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-bottom:20px;">
      <div class="card">
        <div class="card-header">📋 Pending Requests <span id="pending-badge" class="badge badge-pending"></span></div>
        <div class="card-body">
          <div id="pending-list"></div>
          <a href="/admin/requests.html" class="btn btn-outline btn-sm mt-3">Manage all requests</a>
        </div>
      </div>
      <div class="card">
        <div class="card-header">⚠️ Overdue Books</div>
        <div class="card-body">
          <div id="overdue-list"></div>
          <a href="/admin/checkouts.html" class="btn btn-outline btn-sm mt-3">View all checkouts</a>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-header">🕐 Recent Activity</div>
      <div class="card-body">
        <div class="table-wrap">
          <table>
            <thead><tr><th>Member</th><th>Book</th><th>Checked Out</th><th>Due</th><th>Status</th></tr></thead>
            <tbody id="activity-body"></tbody>
          </table>
        </div>
      </div>
    </div>
  </main>
</div>

<script src="/js/api.js"></script>
<script>
function buildSidebar(user) {
  const links = [
    { href: '/admin/index.html',     icon: '📊', label: 'Dashboard' },
    { href: '/admin/inventory.html', icon: '📚', label: 'Inventory' },
    { href: '/admin/users.html',     icon: '👥', label: 'Users' },
    { href: '/admin/requests.html',  icon: '📋', label: 'Requests' },
    { href: '/admin/checkouts.html', icon: '📖', label: 'Checkouts' },
    { href: '/admin/analytics.html', icon: '📈', label: 'Analytics' },
  ];
  const cur = window.location.pathname;
  document.getElementById('sidebar-nav').innerHTML = links.map(l =>
    `<a href="${l.href}" class="${cur.endsWith(l.href.split('/').pop()) ? 'active' : ''}">${l.icon} ${l.label}</a>`
  ).join('');
}

async function init() {
  const user = await requireAuth(['admin']);
  if (!user) return;
  buildSidebar(user);
  document.getElementById('admin-badge').innerHTML = `<span class="badge role-admin">${user.username}</span>`;
  loadData();
}

async function loadData() {
  try {
    const a = await API.get('/api/admin/analytics');

    document.getElementById('stats-grid').innerHTML = `
      <div class="stat-card stat-blue"><div class="stat-label">Total Books</div><div class="stat-value">${a.total_books}</div><div class="stat-sub">${a.total_copies} total copies</div></div>
      <div class="stat-card stat-green"><div class="stat-label">Available</div><div class="stat-value">${a.available}</div><div class="stat-sub">copies on shelf</div></div>
      <div class="stat-card stat-orange"><div class="stat-label">Checked Out</div><div class="stat-value">${a.checked_out}</div><div class="stat-sub">currently borrowed</div></div>
      <div class="stat-card stat-red"><div class="stat-label">Overdue</div><div class="stat-value">${a.overdue}</div><div class="stat-sub">past due date</div></div>
      <div class="stat-card stat-purple"><div class="stat-label">Members</div><div class="stat-value">${a.total_users}</div><div class="stat-sub">registered users</div></div>
      <div class="stat-card stat-orange"><div class="stat-label">Pending</div><div class="stat-value">${a.pending_requests}</div><div class="stat-sub">book requests</div></div>
    `;

    // Pending requests preview
    const pendingEl = document.getElementById('pending-list');
    document.getElementById('pending-badge').textContent = a.pending_requests;
    const reqs = await API.get('/api/admin/requests?status=pending');
    const top5 = (reqs||[]).slice(0,5);
    if (!top5.length) {
      pendingEl.innerHTML = `<div class="empty-state"><div class="icon">✅</div><p>No pending requests</p></div>`;
    } else {
      pendingEl.innerHTML = top5.map(r => `
        <div style="display:flex; align-items:center; justify-content:space-between; padding:8px 0; border-bottom:1px solid var(--border);">
          <div>
            <div style="font-weight:600; font-size:13px;">${esc(r.book.title)}</div>
            <div class="text-muted text-sm">by ${esc(r.user.username)} · ${formatDate(r.requested_at)}</div>
          </div>
          <div style="display:flex; gap:6px;">
            <button class="btn btn-success btn-sm" onclick="approveReq('${r.id}')">✓</button>
            <button class="btn btn-danger btn-sm"  onclick="rejectReq('${r.id}')">✕</button>
          </div>
        </div>
      `).join('');
    }

    // Overdue preview
    const overdueEl = document.getElementById('overdue-list');
    const checkouts = await API.get('/api/admin/checkouts?active=true');
    const overdue = (checkouts||[]).filter(c => c.is_overdue).slice(0,5);
    if (!overdue.length) {
      overdueEl.innerHTML = `<div class="empty-state"><div class="icon">🎉</div><p>No overdue books</p></div>`;
    } else {
      overdueEl.innerHTML = overdue.map(c => `
        <div style="padding:8px 0; border-bottom:1px solid var(--border);">
          <div style="font-weight:600; font-size:13px;">${esc(c.book.title)}</div>
          <div class="text-muted text-sm">${esc(c.user.username)} · Due ${formatDate(c.due_date)}</div>
        </div>
      `).join('');
    }

    // Recent activity
    const tbody = document.getElementById('activity-body');
    if (!(a.recent_activity||[]).length) {
      tbody.innerHTML = `<tr><td colspan="5" class="text-muted" style="text-align:center; padding:24px;">No activity yet</td></tr>`;
    } else {
      tbody.innerHTML = (a.recent_activity||[]).map(c => `
        <tr>
          <td><strong>${esc(c.user.username)}</strong></td>
          <td class="truncate">${esc(c.book.title)}</td>
          <td class="text-muted">${formatDate(c.checked_out_at)}</td>
          <td class="text-muted">${formatDate(c.due_date)}</td>
          <td>${overdueBadge(c)}</td>
        </tr>
      `).join('');
    }
  } catch (e) {
    toast('Failed to load dashboard: ' + e.message, 'error');
  }
}

async function approveReq(id) {
  try { await API.put(`/api/admin/requests/${id}`, { status: 'approved' }); toast('Request approved'); loadData(); }
  catch(e) { toast(e.message,'error'); }
}
async function rejectReq(id) {
  try { await API.put(`/api/admin/requests/${id}`, { status: 'rejected' }); toast('Request rejected'); loadData(); }
  catch(e) { toast(e.message,'error'); }
}

function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
init();
</script>
</body>
</html>
