<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Register — LibraryMS</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-logo">📚 LibraryMS</div>
    <p class="auth-subtitle">Create your library account</p>

    <div id="error-msg" style="display:none; background:#fee2e2; color:#991b1b; padding:10px 14px; border-radius:8px; margin-bottom:16px; font-size:13px;"></div>

    <form id="register-form">
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" class="form-control" placeholder="johndoe" required autofocus>
      </div>
      <div class="form-group">
        <label for="email">Email address</label>
        <input type="email" id="email" class="form-control" placeholder="you@example.com" required>
      </div>
      <div class="form-group">
        <label for="password">Password <span style="color:var(--text-muted);font-weight:400">(min. 6 characters)</span></label>
        <input type="password" id="password" class="form-control" placeholder="••••••••" required minlength="6">
      </div>
      <button type="submit" class="btn btn-primary w-full btn-lg" id="submit-btn">Create Account</button>
    </form>

    <div class="auth-footer">
      Already have an account? <a href="/login.html">Sign in</a>
    </div>
  </div>
</div>

<script src="/js/api.js"></script>
<script>
  document.getElementById('register-form').addEventListener('submit', async e => {
    e.preventDefault();
    const btn = document.getElementById('submit-btn');
    const err = document.getElementById('error-msg');
    err.style.display = 'none';
    btn.disabled = true;
    btn.textContent = 'Creating account…';
    try {
      await API.post('/api/auth/register', {
        username: document.getElementById('username').value,
        email:    document.getElementById('email').value,
        password: document.getElementById('password').value,
      });
      window.location = '/dashboard.html';
    } catch (e) {
      err.textContent = e.message;
      err.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'Create Account';
    }
  });
</script>
</body>
</html>
