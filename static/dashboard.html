<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dashboard — LibraryMS</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<header class="topnav">
  <div class="logo">📚 LibraryMS</div>
  <nav id="main-nav"></nav>
  <div class="user-info" id="nav-user"></div>
</header>

<div class="page">
  <div class="page-header">
    <div>
      <h1 class="page-title" id="welcome-msg">Welcome back!</h1>
      <p class="page-subtitle">Here's what's happening with your library account.</p>
    </div>
  </div>

  <div class="stats-grid" id="stats-grid"></div>

  <div style="display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-top:8px;" id="dashboard-panels">
    <div class="card">
      <div class="card-header">📋 My Recent Requests</div>
      <div class="card-body">
        <div id="recent-requests"><p class="text-muted text-sm">Loading…</p></div>
        <a href="/requests.html" class="btn btn-outline btn-sm mt-3">View all requests</a>
      </div>
    </div>
    <div class="card">
      <div class="card-header">📖 Currently Checked Out</div>
      <div class="card-body">
        <div id="active-checkouts"><p class="text-muted text-sm">Loading…</p></div>
        <a href="/books.html" class="btn btn-outline btn-sm mt-3">Browse books</a>
      </div>
    </div>
  </div>

  <!-- Clerk/Admin quick links -->
  <div id="elevated-panel" style="display:none; margin-top:20px;">
    <div class="card">
      <div class="card-header">⚡ Quick Actions</div>
      <div class="card-body flex gap-3" style="flex-wrap:wrap;">
        <a href="/clerk.html" class="btn btn-primary">🖥 Open Checkout Desk</a>
        <a href="/admin/index.html" id="admin-link" style="display:none;" class="btn btn-warning">⚙️ Admin Dashboard</a>
      </div>
    </div>
  </div>
</div>

<script src="/js/api.js"></script>
<script>
let currentUser = null;

async function init() {
  currentUser = await requireAuth();
  if (!currentUser) return;
  buildTopNav(currentUser);
  document.getElementById('welcome-msg').textContent = `Welcome back, ${currentUser.username}!`;

  if (currentUser.role === 'clerk' || currentUser.role === 'admin') {
    document.getElementById('elevated-panel').style.display = '';
  }
  if (currentUser.role === 'admin') {
    document.getElementById('admin-link').style.display = '';
  }

  loadStats();
  loadRequests();
  loadCheckouts();
}

async function loadStats() {
  const grid = document.getElementById('stats-grid');
  try {
    const reqs = await API.get('/api/user/requests');
    const pending   = (reqs||[]).filter(r => r.status === 'pending').length;
    const approved  = (reqs||[]).filter(r => r.status === 'approved').length;
    const fulfilled = (reqs||[]).filter(r => r.status === 'fulfilled').length;

    grid.innerHTML = `
      <div class="stat-card stat-blue">
        <div class="stat-label">Pending Requests</div>
        <div class="stat-value">${pending}</div>
        <div class="stat-sub">awaiting approval</div>
      </div>
      <div class="stat-card stat-green">
        <div class="stat-label">Approved</div>
        <div class="stat-value">${approved}</div>
        <div class="stat-sub">ready to pick up</div>
      </div>
      <div class="stat-card stat-purple">
        <div class="stat-label">Total Borrowed</div>
        <div class="stat-value">${fulfilled}</div>
        <div class="stat-sub">books fulfilled</div>
      </div>
    `;
  } catch {}
}

async function loadRequests() {
  const el = document.getElementById('recent-requests');
  try {
    const reqs = await API.get('/api/user/requests');
    const recent = (reqs||[]).slice(0, 4);
    if (!recent.length) {
      el.innerHTML = `<div class="empty-state"><div class="icon">📋</div><p>No requests yet.<br><a href="/books.html">Browse books</a></p></div>`;
      return;
    }
    el.innerHTML = recent.map(r => `
      <div style="display:flex; align-items:center; justify-content:space-between; padding:10px 0; border-bottom:1px solid var(--border);">
        <div>
          <div style="font-weight:600; font-size:13px;">${r.book.title}</div>
          <div class="text-muted text-sm">${r.book.author}</div>
        </div>
        ${statusBadge(r.status)}
      </div>
    `).join('');
  } catch { el.innerHTML = '<p class="text-muted text-sm">Failed to load.</p>'; }
}

async function loadCheckouts() {
  // We'll derive from requests with status 'approved'
  const el = document.getElementById('active-checkouts');
  try {
    const reqs = await API.get('/api/user/requests');
    const approved = (reqs||[]).filter(r => r.status === 'approved');
    if (!approved.length) {
      el.innerHTML = `<div class="empty-state"><div class="icon">📖</div><p>No books checked out.<br>Visit the clerk desk to check out.</p></div>`;
      return;
    }
    el.innerHTML = approved.map(r => `
      <div style="display:flex; align-items:center; justify-content:space-between; padding:10px 0; border-bottom:1px solid var(--border);">
        <div>
          <div style="font-weight:600; font-size:13px;">${r.book.title}</div>
          <div class="text-muted text-sm">${r.book.author}</div>
        </div>
        <span class="badge badge-approved">approved</span>
      </div>
    `).join('');
  } catch { el.innerHTML = '<p class="text-muted text-sm">Failed to load.</p>'; }
}

init();
</script>
</body>
</html>
